<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Rose | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-body">
    <div id="notification-host"></div>
    <div class="bg-animate" id="stars"></div>
    
    <div class="login-card">
        <div class="logo-main">WIND ROSE</div>
        <p style="color: #555; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">Developer Interface</p>
        <button id="login-btn" class="discord-btn">Entrar com Discord</button>
    </div>

    <script>
        const stars = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 3 + 2 + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDelay = Math.random() * 15 + 's';
            stars.appendChild(s);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
