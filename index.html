<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Rose Studios | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh; background: #050505;">
    
    <div class="card" style="text-align: center; max-width: 400px; width: 90%; border: 1px solid #222;">
        <h1 style="color: #00b2ff; font-weight: 800; margin-bottom: 10px;">WIND ROSE</h1>
        <p style="color: #888; margin-bottom: 30px;">Painel Interno de Desenvolvedores</p>
        
        <button id="login-btn" class="btn" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            Entrar com Discord
        </button>
        
        <p id="msg-erro" style="color: #ff4b4b; margin-top: 15px; font-size: 14px; display: none;">
            Acesso negado. Verifique seu cargo no Discord.
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
