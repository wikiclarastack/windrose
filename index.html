<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Rose Studios | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #050505; overflow: hidden; font-family: 'Outfit', sans-serif; }
        .bg-animate { position: absolute; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); }
        .star { position: absolute; background: #00b2ff; border-radius: 50%; opacity: 0.3; filter: blur(1px); animation: move 15s infinite linear; }
        @keyframes move { from { transform: translateY(100vh) scale(0); opacity: 0; } 50% { opacity: 0.6; } to { transform: translateY(-10vh) scale(1.2); opacity: 0; } }
        .login-card { background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(25px); border: 1px solid rgba(0, 178, 255, 0.1); padding: 50px; border-radius: 30px; text-align: center; width: 400px; box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); animation: slideUp 0.8s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .logo-main { font-size: 32px; font-weight: 900; color: #00b2ff; letter-spacing: 3px; text-shadow: 0 0 20px rgba(0, 178, 255, 0.5); margin-bottom: 10px; }
        .discord-btn { background: #5865F2; color: white; border: none; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.4s; margin-top: 30px; }
        .discord-btn:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4); background: #4752c4; }
    </style>
</head>
<body>
    <div class="bg-animate" id="stars"></div>
    <div class="login-card">
        <div class="logo-main">WIND ROSE</div>
        <p style="color: #555; font-size: 12px; letter-spacing: 2px;">DEVELOPER INTERFACE</p>
        <button id="login-btn" class="discord-btn">Entrar com Discord</button>
    </div>
    <script>
        const stars = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 4 + 2 + 'px';
            s.style.width = size; s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDelay = Math.random() * 15 + 's';
            stars.appendChild(s);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
