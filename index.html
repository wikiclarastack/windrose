<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Rose | Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background: #050505; 
            overflow: hidden; 
            font-family: 'Outfit', sans-serif; 
        }

        /* Fundo de Partículas Animado */
        .bg-animate { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); 
        }

        .star { 
            position: absolute; 
            background: #00b2ff; 
            border-radius: 50%; 
            opacity: 0.3; 
            filter: blur(1px); 
            animation: move 15s infinite linear; 
        }

        @keyframes move { 
            from { transform: translateY(100vh) scale(0); opacity: 0; } 
            50% { opacity: 0.6; } 
            to { transform: translateY(-10vh) scale(1.2); opacity: 0; } 
        }

        /* Card de Login */
        .login-card { 
            background: rgba(10, 10, 15, 0.8); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(0, 178, 255, 0.1); 
            padding: 50px; 
            border-radius: 30px; 
            text-align: center; 
            width: 380px; 
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); 
            animation: slideUp 0.8s ease; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .logo-main { 
            font-size: 32px; 
            font-weight: 900; 
            color: #00b2ff; 
            letter-spacing: 3px; 
            text-shadow: 0 0 20px rgba(0, 178, 255, 0.5); 
            margin-bottom: 10px; 
        }

        .discord-btn { 
            background: #5865F2; 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px; 
            transition: 0.4s; 
            margin-top: 30px; 
        }

        .discord-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4); 
            background: #4752c4; 
        }

        #notification-host {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div id="notification-host"></div>

    <div class="bg-animate" id="stars"></div>

    <div class="login-card">
        <div class="logo-main">WIND ROSE</div>
        <p style="color: #555; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;">Developers (This system has been developed by dbCrona)</p>
        
        <button id="login-btn" class="discord-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037 19.736 19.736 0 0 0-4.885 1.515.069.069 0 0 0-.032.027C.533 9.048-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.06.06 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            Entrar com Discord
        </button>
    </div>

    <script>
        // Gerador de partículas
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 4 + 2 + 'px';
            s.style.width = size; 
            s.style.height = size;
            s.style.left = Math.random() * 100 + 'vw';
            s.style.animationDelay = Math.random() * 15 + 's';
            s.style.animationDuration = (Math.random() * 10 + 10) + 's';
            starsContainer.appendChild(s);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
