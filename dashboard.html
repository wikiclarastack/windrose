<body class="dashboard-body">
    <aside class="sidebar">
        <div class="logo-hub">WIND ROSE</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('overview')"><i class="lc-layout-dashboard"></i> Dashboard</li>
            <li class="nav-item" onclick="switchTab('investments')"><i class="lc-dollar-sign"></i> Investimentos</li>
            <li class="nav-item" onclick="switchTab('updates')"><i class="lc-zap"></i> Patch Notes</li>
        </ul>
        <button id="logout-btn" class="nav-item" style="color: #ff4b4b; margin-top: auto; border:none; background:none; width:100%"><i class="lc-log-out"></i> Sair</button>
    </aside>

    <main class="main-content">
        <section id="overview" class="view-section active">
            <h1>Visão Geral</h1>
            <div class="grid-stats">
                <div class="stat-card"><h3>Total Investido</h3><p id="total-val">R$ 0,00</p></div>
                <div class="stat-card"><h3>Updates</h3><p id="total-updates">0</p></div>
                <div class="stat-card"><h3>Seu Cargo</h3><p id="user-role-display">Verificando...</p></div>
            </div>
        </section>

        <section id="investments" class="view-section">
            <h1>Investimentos</h1>
            <div class="stat-card" style="margin-bottom: 2rem;">
                <h3>Registrar Novo</h3>
                <input type="text" id="inv-name" placeholder="Nome do Investimento">
                <input type="number" id="inv-value" placeholder="Valor (R$)">
                <button class="btn-primary" style="margin-top: 1rem;" onclick="addInvestment()">Salvar</button>
            </div>
            <table class="data-table">
                <thead><tr><th>Nome</th><th>Valor</th><th>Data</th></tr></thead>
                <tbody id="list-inv"></tbody>
            </table>
        </section>

        <section id="updates" class="view-section">
            <h1>Atualizações do Jogo</h1>
            <div class="stat-card" style="margin-bottom: 2rem;">
                <input type="text" id="up-title" placeholder="Título da Versão">
                <textarea id="up-desc" placeholder="O que mudou?"></textarea>
                <button class="btn-primary" onclick="addUpdate()">Publicar Patch</button>
            </div>
            <div id="list-updates"></div>
        </section>
    </main>
</body>
