<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wind Rose | Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo"><i data-lucide="wind"></i> WIND ROSE</div>
            <nav>
                <div class="nav-link active" onclick="showTab('tab-home')"><i data-lucide="layout-grid"></i> Dashboard</div>
                <div class="nav-link" onclick="showTab('tab-invest')"><i data-lucide="database"></i> Investimentos</div>
                <div class="nav-link" onclick="showTab('tab-patch')"><i data-lucide="scroll"></i> Patch Notes</div>
            </nav>
            <div style="margin-top: auto;">
                <button id="logout-btn" class="nav-link" style="border:none; background:none; width:100%"><i data-lucide="log-out"></i> Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <section id="tab-home" class="tab-content active animate">
                <header style="margin-bottom: 30px;">
                    <h1>Bem-vindo, <span id="user-display">Dev</span></h1>
                    <p style="color: var(--text-dim)">Status do Wind Rose Studios em tempo real.</p>
                </header>
                
                <div class="stat-grid">
                    <div class="card">
                        <p style="color: var(--text-dim)">Investimento Robux</p>
                        <h2 style="font-size: 2rem; margin-top: 10px;"><span class="robux-icon">R$</span> <span id="total-robux">0</span></h2>
                    </div>
                    <div class="card">
                        <p style="color: var(--text-dim)">Patch Notes</p>
                        <h2 id="count-patches" style="font-size: 2rem; margin-top: 10px;">0</h2>
                    </div>
                    <div class="card">
                        <p style="color: var(--text-dim)">Status Servidor</p>
                        <h2 style="font-size: 2rem; margin-top: 10px; color: #10b981;">Online</h2>
                    </div>
                </div>
            </section>

            <section id="tab-invest" class="tab-content animate">
                <h1>Gestão de Robux</h1>
                <div class="card" style="margin-top: 20px; max-width: 500px;">
                    <h3>Novo Registro</h3>
                    <input type="text" id="inv-name" placeholder="Origem/Nome">
                    <input type="number" id="inv-amt" placeholder="Quantidade em Robux">
                    <button class="btn" onclick="saveInvestment()">Adicionar Robux</button>
                </div>

                <div class="card" style="margin-top: 30px;">
                    <table>
                        <thead><tr><th>Nome</th><th>Quantia</th><th>Data</th></tr></thead>
                        <tbody id="table-inv"></tbody>
                    </table>
                </div>
            </section>

            <section id="tab-patch" class="tab-content animate">
                <h1>Patch Notes</h1>
                <div class="card" style="margin-top: 20px;">
                    <input type="text" id="patch-title" placeholder="Versão (ex: v1.2)">
                    <textarea id="patch-desc" rows="4" placeholder="O que mudou no jogo?"></textarea>
                    <button class="btn" onclick="savePatch()">Publicar Atualização</button>
                </div>
                <div id="patches-list" style="margin-top: 30px;"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
