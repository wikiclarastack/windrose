<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wind Rose | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">
    <div class="bg-blur"></div>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">WIND ROSE</div>
            <nav>
                <div class="nav-link active" onclick="switchTab('home', this)"><i data-lucide="layout"></i> Dashboard</div>
                <div class="nav-link" onclick="switchTab('invest', this)"><i data-lucide="coins"></i> Investimentos</div>
                <div class="nav-link" onclick="switchTab('patch', this)"><i data-lucide="git-branch"></i> Patch Notes</div>
                <div class="nav-link" onclick="switchTab('chat', this)"><i data-lucide="message-circle"></i> Chat</div>
                <div id="admin-nav" class="nav-link" style="display:none;" onclick="switchTab('admin', this)"><i data-lucide="lock"></i> Admin</div>
            </nav>
            <div class="user-info-side">
                <img id="user-avatar-side" src="" alt="">
                <div>
                    <p id="user-name-side">Carregando...</p>
                    <span id="user-role-tag">Visitante</span>
                </div>
            </div>
            <button id="logout-btn" class="nav-link logout-style"><i data-lucide="log-out"></i> Sair</button>
        </aside>

        <main class="main-content">
            <div id="top-alert-banner" class="animate" style="display:none;">
                <div class="alert-box">
                    <div>
                        <span class="badge-alert">SISTEMA</span>
                        <p id="alert-text"></p>
                    </div>
                    <small id="alert-author"></small>
                </div>
            </div>

            <section id="home" class="view active">
                <h1 class="welcome-text">Painel Principal</h1>
                <div class="stats-grid">
                    <div class="card card-grad">
                        <p>Total Robux</p>
                        <div class="val">R$ <span id="total-robux">0</span></div>
                    </div>
                    <div class="card card-grad">
                        <p>Notas de Versão</p>
                        <div class="val" id="total-patches">0</div>
                    </div>
                    <div class="card card-grad">
                        <p>Status da Equipe</p>
                        <div class="val" style="color:#00ff88">Ativo</div>
                    </div>
                </div>
            </section>

            <section id="invest" class="view">
                <h1>Investimentos</h1>
                <div class="card" style="max-width:450px; margin:20px 0;">
                    <input type="text" id="inv-name" placeholder="Fonte do Investimento">
                    <input type="number" id="inv-amt" placeholder="Quantia em Robux">
                    <button class="btn" onclick="addRobux()">Registrar</button>
                </div>
                <div class="card table-container">
                    <table>
                        <thead><tr><th>Origem</th><th>Quantia</th><th>Data</th></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </section>

            <section id="patch" class="view">
                <h1>Patch Notes</h1>
                <div class="card" style="margin:20px 0;">
                    <input type="text" id="p-title" placeholder="Tag da Versão">
                    <textarea id="p-desc" rows="4" placeholder="Mudanças realizadas..."></textarea>
                    <button class="btn" onclick="addPatch()">Publicar</button>
                </div>
                <div id="patches-container"></div>
            </section>

            <section id="chat" class="view">
                <h1>Chat de Desenvolvedores</h1>
                <div id="chat-box" class="card chat-card"></div>
                <div class="chat-controls">
                    <input type="text" id="chat-input" placeholder="Sua mensagem...">
                    <button class="btn-send" onclick="sendMessage(false)"><i data-lucide="send"></i></button>
                    <button id="btn-chat-announcement" class="btn-warn" onclick="sendMessage(true)" style="display:none;"><i data-lucide="alert-triangle"></i></button>
                </div>
            </section>

            <section id="admin" class="view">
                <h1>Administração</h1>
                <div class="card">
                    <h3>Alerta Global</h3>
                    <textarea id="dash-alert-input" placeholder="Mensagem para toda a equipe..."></textarea>
                    <button class="btn" onclick="createDashAlert()">Enviar para Dashboard</button>
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
