<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wind Rose Studios | Painel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">WIND ROSE</div>
        <div class="nav-item active" onclick="switchTab('home')">Dashboard</div>
        <div class="nav-item" onclick="switchTab('invest')">Investimentos</div>
        <div class="nav-item" onclick="switchTab('patch')">Patch Notes</div>
        <div id="logout-btn" class="nav-item" style="margin-top: auto; color: #ff4b4b;">Sair</div>
    </aside>

    <main class="main-content">
        <section id="home" class="tab-content active">
            <h1>Visão Geral</h1>
            <div class="stat-grid">
                <div class="card">
                    <p>Total em Robux</p>
                    <div class="robux-val">R$ <span id="total-robux">0</span></div>
                </div>
                <div class="card">
                    <p>Atualizações</p>
                    <div class="robux-val" id="total-updates" style="color: white">0</div>
                </div>
            </div>
        </section>

        <section id="invest" class="tab-content">
            <h1>Investimentos (Robux)</h1>
            <div class="card" style="max-width: 400px; margin-top: 20px;">
                <input type="text" id="inv-name" placeholder="Nome do Investimento">
                <input type="number" id="inv-amt" placeholder="Valor em Robux">
                <button class="btn" onclick="saveInvestment()">Salvar</button>
            </div>
            <table>
                <thead><tr><th>Nome</th><th>Quantia</th><th>Data</th></tr></thead>
                <tbody id="table-inv"></tbody>
            </table>
        </section>

        <section id="patch" class="tab-content">
            <h1>Patch Notes</h1>
            <div class="card" style="margin-top: 20px;">
                <input type="text" id="p-title" placeholder="Título">
                <textarea id="p-desc" placeholder="O que mudou?"></textarea>
                <button class="btn" onclick="savePatch()">Publicar</button>
            </div>
            <div id="list-patches" style="margin-top: 20px;"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
