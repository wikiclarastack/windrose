<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wind Rose | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dashboard-body">
    <div class="bg-blur"></div>
    <audio id="mention-sound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">WIND ROSE</div>
            <nav>
                <div class="nav-link active" onclick="switchTab('home', this)"><i data-lucide="layout"></i> Dashboard</div>
                <div class="nav-link" onclick="switchTab('invest', this)"><i data-lucide="coins"></i> Finanças</div>
                <div class="nav-link" onclick="switchTab('chat', this)"><i data-lucide="message-circle"></i> Chat</div>
                <div id="admin-nav" class="nav-link" style="display:none;" onclick="switchTab('admin', this)"><i data-lucide="shield"></i> Admin</div>
            </nav>
            <div class="user-info-side" onclick="openMyProfile()" style="cursor:pointer">
                <img id="user-avatar-side" src="" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
                <div>
                    <p id="user-name-side">...</p>
                    <span id="user-role-tag">Visitante</span>
                </div>
            </div>
            <button id="logout-btn" class="nav-link logout-style"><i data-lucide="log-out"></i> Sair</button>
        </aside>

        <main class="main-content">
            <div id="top-alert-banner" class="animate" style="display:none; background:rgba(0,178,255,0.1); border:1px solid var(--accent); padding:20px; border-radius:15px; margin-bottom:25px;">
                <p id="alert-text" style="font-weight:600;"></p>
                <small id="alert-author" style="opacity:0.5"></small>
            </div>

            <section id="home" class="view active">
                <h1>Painel de Controle</h1>
                <div class="stats-grid">
                    <div class="card card-grad"><p>Total Robux</p><div class="val">R$ <span id="total-robux">0</span></div></div>
                    <div class="card card-grad"><p>Desenvolvedores Online</p><div class="val" id="online-count-main">0</div></div>
                </div>
            </section>

            <section id="invest" class="view">
                <h1>Investimentos (Robux)</h1>
                <div class="card" style="max-width:400px; margin:20px 0;">
                    <input type="text" id="inv-name" placeholder="Fonte">
                    <input type="number" id="inv-amt" placeholder="Valor em Robux">
                    <button class="btn" onclick="addRobux()">Registrar</button>
                </div>
                <div class="card">
                    <table><thead><tr><th>Origem</th><th>Valor</th><th>Data</th></tr></thead><tbody id="table-body"></tbody></table>
                </div>
            </section>

            <section id="chat" class="view">
                <div class="chat-layout">
                    <div class="chat-main">
                        <div id="chat-box" class="card chat-card"></div>
                        <div class="chat-controls">
                            <input type="text" id="chat-input" placeholder="Digite @nome para mencionar...">
                            <button class="btn-send" onclick="sendMessage()"><i data-lucide="send"></i></button>
                            <button id="btn-chat-announcement" class="btn-warn" onclick="sendMessage(true)" style="display:none;"><i data-lucide="alert-circle"></i></button>
                        </div>
                    </div>
                    <div class="online-sidebar">
                        <h3>Online — <span id="online-count">0</span></h3>
                        <div id="user-list"></div>
                    </div>
                </div>
            </section>

            <section id="admin" class="view">
                <h1>Administração</h1>
                <div class="card">
                    <h3>Novo Alerta Global</h3>
                    <textarea id="dash-alert-input" placeholder="Mensagem para o topo da dashboard..."></textarea>
                    <button class="btn" onclick="createDashAlert()">Publicar Alerta</button>
                </div>
            </section>
        </main>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content card">
            <div id="profile-banner" class="profile-banner"></div>
            <div class="profile-header">
                <img id="profile-img" src="" class="profile-avatar">
                <h2 id="profile-name">...</h2>
                <span id="profile-badge" class="badge-alert">DEVELOPER</span>
            </div>
            <div class="profile-body">
                <h4>Bio</h4><p id="profile-bio">...</p>
                <h4>Especialidades</h4><p id="profile-specialties">...</p>
                <div id="profile-edit-fields" style="display:none; margin-top:15px;">
                    <textarea id="edit-bio" placeholder="Sua bio..."></textarea>
                    <input type="text" id="edit-spec" placeholder="Suas especialidades...">
                    <button class="btn" onclick="saveProfile()">Salvar</button>
                </div>
            </div>
            <button class="btn-warn" onclick="closeProfile()" style="margin:20px; width:calc(100% - 40px)">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
