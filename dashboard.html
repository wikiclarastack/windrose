<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Wind Rose | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-wrapper">
        <aside class="sidebar">
            <div class="logo">WIND ROSE</div>
            <div class="nav-link active" onclick="switchTab('home', this)">Dashboard</div>
            <div class="nav-link" onclick="switchTab('invest', this)">Investimentos</div>
            <div class="nav-link" onclick="switchTab('patch', this)">Patch Notes</div>
            <div id="logout-btn" class="nav-link" style="margin-top:auto; color:#ff4b4b;">Sair</div>
        </aside>

        <main class="main-content">
            <section id="home" class="view active">
                <h1>Olá, <span id="user-name">...</span></h1>
                <div class="stats-grid" style="margin-top:30px;">
                    <div class="card"><p>Total Investido</p><div class="val">R$ <span id="total-robux">0</span></div></div>
                    <div class="card"><p>Versão Atual</p><div class="val" id="current-v" style="color:#fff">v0.0</div></div>
                    <div class="card"><p>Status</p><div class="val" style="color:#00ff88">Ativo</div></div>
                </div>
            </section>

            <section id="invest" class="view">
                <h1>Investimentos (Robux)</h1>
                <div class="card" style="max-width:400px; margin: 25px 0;">
                    <input type="text" id="inv-name" placeholder="Motivo/Origem">
                    <input type="number" id="inv-amt" placeholder="Quantia em Robux">
                    <button class="btn" onclick="addRobux()">Registrar</button>
                </div>
                <table>
                    <thead><tr><th>Origem</th><th>Quantia</th><th>Data</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </section>

            <section id="patch" class="view">
                <h1>Patch Notes</h1>
                <div class="card" style="margin: 25px 0;">
                    <input type="text" id="p-title" placeholder="Título do Patch (ex: v1.0)">
                    <textarea id="p-desc" rows="4" placeholder="O que mudou?"></textarea>
                    <button class="btn" onclick="addPatch()">Publicar Atualização</button>
                </div>
                <div id="patches-container"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
